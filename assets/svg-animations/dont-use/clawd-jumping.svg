<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 16" width="300" height="320">
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000">
    <animate id="shadow-opacity-animation" attributeName="opacity" values="0.5; 0.5; 0.4; 0.2; 0.1; 0.3; 0.5; 0.5" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
    <animate id="shadow-width-animation" attributeName="width" values="9; 11; 9; 7; 5; 7; 9; 9" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
    <animate id="shadow-x-animation" attributeName="x" values="3; 2; 3; 4; 5; 4; 3; 3" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <g id="master-jumping-group">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,1; 0,-1; 0,-3; 0,-4; 0,-2; 0,0; 0,0" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
    
    <g id="body-color-group" fill="#DE886D">
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      
      <rect id="left-arm" x="0" y="9" width="2" height="2">
        <animate attributeName="y" values="9; 10; 9; 7; 6; 7; 9; 9" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="right-arm" x="13" y="9" width="2" height="2">
        <animate attributeName="y" values="9; 10; 9; 7; 6; 7; 9; 9" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2">
        <animate attributeName="height" values="2; 1; 2; 1; 1; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="inner-left-leg" x="5" y="13" width="1" height="1">
        <animate attributeName="height" values="2; 0; 1; 1; 1; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="inner-right-leg" x="9" y="13" width="1" height="1">
        <animate attributeName="height" values="2; 0; 1; 1; 1; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2">
        <animate attributeName="height" values="2; 1; 2; 1; 1; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </g>
    
    <g id="eyes-color-group" fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2">
        <animate attributeName="height" values="2; 1; 2; 2; 2; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
      
      <rect id="right-eye" x="10" y="8" width="1" height="2">
        <animate attributeName="height" values="2; 1; 2; 2; 2; 2; 2; 2" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </g>
  </g>
</svg>